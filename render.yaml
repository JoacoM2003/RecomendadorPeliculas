services:
  - type: web
    name: recomendador-peliculas
    env: python
    buildCommand: "./build.sh"
    startCommand: "python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: GEMINI_API_KEY
        sync: false # Vos vas a poner la API Key en el panel de Render
